<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scuola di Canoa Polo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Karla:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --water-deep: #073b4c;
            --water-mid: #118ab2;
            --water-light: #d9f2f5;
            --foam: #f4fbfb;
            --ball-orange: #ff6b35;
            --wood-paddle: #c9873f;
            --ink: #0a2430;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Karla', sans-serif;
            background-color: var(--foam);
            color: var(--ink);
            margin: 0;
            padding: 0;
        }

        h1, h2, .tab-button {
            font-family: 'Anton', sans-serif;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        header {
            position: relative;
            background: linear-gradient(180deg, var(--water-deep) 0%, var(--water-mid) 100%);
            color: white;
            padding: 50px 20px 70px;
            overflow: hidden;
            text-align: center;
        }

        .hero-graphic {
            width: 220px;
            height: auto;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 3em;
            margin: 0 0 6px 0;
            text-shadow: 0 3px 0 rgba(0,0,0,0.15);
        }

        .tagline {
            font-family: 'Karla', sans-serif;
            font-style: italic;
            font-weight: 400;
            font-size: 1.05em;
            color: var(--water-light);
            margin: 0 0 26px 0;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            position: relative;
            z-index: 2;
        }

        .tab-button {
            background-color: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.7);
            color: white;
            padding: 10px 26px;
            font-size: 0.95em;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }
        .tab-button:hover {
            background-color: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }
        .tab-button.active {
            background-color: var(--ball-orange);
            border-color: var(--ball-orange);
            color: white;
        }

        .wave-divider {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            line-height: 0;
        }

        .content-container {
            padding: 50px 20px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .page-section {
            display: none;
        }
        .page-section.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .intro {
            font-size: 1.25em;
            max-width: 560px;
            margin: 0 auto 36px;
            line-height: 1.5;
        }

        .image-block {
            display: block;
            margin: 20px auto;
            position: relative;
        }

        img {
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(7,59,76,0.25);
            display: inline-block;
            border: 4px solid white;
        }

        .caption {
            font-size: 0.9em;
            color: var(--water-mid);
            font-style: italic;
            margin-top: 12px;
            font-weight: 700;
        }

        .paddle-divider {
            width: 140px;
            height: auto;
            margin: 40px auto;
            opacity: 0.85;
        }

        .contact-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(7,59,76,0.15);
            padding: 36px;
            font-size: 1.15em;
            line-height: 2;
            max-width: 420px;
            margin: 0 auto;
            border-top: 6px solid var(--ball-orange);
        }
        .contact-card strong {
            color: var(--water-mid);
        }

        footer {
            background-color: var(--water-deep);
            color: var(--water-light);
            padding: 24px;
            margin-top: 50px;
            font-size: 0.9em;
        }
        .hero-graphic .paddle-group {
            transform-origin: 150px 90px;
            animation: paddleRow 2.2s ease-in-out infinite;
        }
        .hero-graphic .canoe-hull,
        .hero-graphic .paddler {
            animation: gentleBob 2.2s ease-in-out infinite;
        }
        @keyframes paddleRow {
            0%   { transform: rotate(-28deg); }
            50%  { transform: rotate(-4deg); }
            100% { transform: rotate(-28deg); }
        }
        @keyframes gentleBob {
            0%   { transform: translateY(0); }
            50%  { transform: translateY(-2px); }
            100% { transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .hero-graphic .paddle-group,
            .hero-graphic .canoe-hull,
            .hero-graphic .paddler {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <svg class="hero-graphic" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
            <!-- increspature dell'acqua -->
            <path d="M0,122 Q37,112 75,122 T150,122 T225,122 T300,122" stroke="var(--water-light,#d9f2f5)" stroke-width="4" fill="none" opacity="0.6"/>
            <path d="M0,133 Q37,123 75,133 T150,133 T225,133 T300,133" stroke="var(--water-light,#d9f2f5)" stroke-width="3" fill="none" opacity="0.4"/>

            <!-- scafo della canoa -->
            <g class="canoe-hull">
                <path d="M45,112 Q150,88 255,112 Q150,128 45,112 Z" fill="var(--wood-paddle,#c9873f)" stroke="var(--ink,#0a2430)" stroke-width="2"/>
                <path d="M62,109 Q150,98 238,109" fill="none" stroke="var(--water-deep,#073b4c)" stroke-width="3" stroke-linecap="round"/>
            </g>

            <!-- pagaiatore -->
            <g class="paddler">
                <rect x="138" y="76" width="24" height="32" rx="11" fill="var(--water-deep,#073b4c)"/>
                <circle cx="150" cy="67" r="10" fill="#f2c9a0"/>
            </g>

            <!-- pagaia in movimento -->
            <g class="paddle-group" transform="rotate(-28 150 90)">
                <rect x="147" y="38" width="6" height="100" rx="3" fill="var(--wood-paddle,#c9873f)"/>
                <ellipse cx="150" cy="34" rx="10" ry="18" fill="var(--wood-paddle,#c9873f)"/>
                <ellipse cx="150" cy="142" rx="10" ry="18" fill="var(--wood-paddle,#c9873f)"/>
            </g>

            <!-- schizzi d'acqua -->
            <circle cx="112" cy="119" r="3" fill="var(--water-light,#d9f2f5)"/>
            <circle cx="101" cy="124" r="2" fill="var(--water-light,#d9f2f5)"/>
            <circle cx="193" cy="119" r="3" fill="var(--water-light,#d9f2f5)"/>
            <circle cx="204" cy="124" r="2" fill="var(--water-light,#d9f2f5)"/>
        </svg>
        <h1>Scuola di Canoa Polo</h1>
        <p class="tagline">Pagaia, gioca, vinci &mdash; in acqua con noi</p>
        <nav>
            <button class="tab-button active" data-tab="home" onclick="showTab('home')">Home</button>
            <button class="tab-button" data-tab="contatti" onclick="showTab('contatti')">Contatti</button>
        </nav>
        <svg class="wave-divider" viewBox="0 0 1440 80" preserveAspectRatio="none">
            <path fill="#f4fbfb" d="M0,32 C240,80 480,0 720,24 C960,48 1200,72 1440,32 L1440,80 L0,80 Z"></path>
        </svg>
    </header>

    <div class="content-container">
        <section id="home" class="page-section active">
            <p class="intro">In questo sito troverai tutte le informazioni per iniziare il tuo percorso nella canoa polo!</p>

            <div class="image-block">
                <img src="CanoaPoloPlayerNew.jpg" alt="Giocatore di canoa polo in azione sull'acqua" width="400" height="200">
                <p class="caption">Canoa Kayak Club Cervia</p>
            </div>

            <svg class="paddle-divider" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
                <g transform="translate(60,30) rotate(-20)">
                    <ellipse cx="0" cy="-22" rx="9" ry="18" fill="var(--wood-paddle,#c9873f)"/>
                    <rect x="-2.5" y="-8" width="5" height="42" rx="2.5" fill="var(--wood-paddle,#c9873f)"/>
                </g>
                <g transform="translate(140,30) rotate(20)">
                    <ellipse cx="0" cy="-22" rx="9" ry="18" fill="var(--wood-paddle,#c9873f)"/>
                    <rect x="-2.5" y="-8" width="5" height="42" rx="2.5" fill="var(--wood-paddle,#c9873f)"/>
                </g>
            </svg>
        </section>

        <section id="contatti" class="page-section">
            <div class="contact-card">
                <p><strong>Tel:</strong> +39 123 456 7890</p>
                <p><strong>Email:</strong> napoleone.bonaparte1821@gmail.com</p>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; Scuola di Canoa Polo</p>
    </footer>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.page-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');
            document.querySelector('.tab-button[data-tab="' + tabId + '"]').classList.add('active');
        }
    </script>
</body>
</html>
