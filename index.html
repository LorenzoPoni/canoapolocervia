<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scuola di Canoa Polo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff; 
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #0066cc; 
            color: white;
            padding: 30px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2.5em;
            margin: 0;
        }
        .content-container {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .intro {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .image-block {
            display: block;
            margin: 20px auto;
        }
        img {
            border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
            display: inline-block; /* Forza il browser a considerare l'immagine come elemento visibile */
        }
        .caption {
            font-size: 0.9em;
            color: #555;
            font-style: italic;
            margin-top: 10px;
        }
        footer {
            background-color: #e0e0e0;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Scuola di Canoa Polo</h1>
    </header>

    <div class="content-container">
        <p class="intro">In questo sito troverai tutte le informazioni per iniziare il tuo percorso nella canoa polo!</p>
        
        <div class="image-block">
            <img src="CanoaPoloPlayer.jfif" alt="Giocatore di canoa polo in azione sull'acqua" width="400" height="200">
            <p class="caption">Canoa Kayak Club Cervia</p>
        </div>
    </div>

    <footer>
        <p><strong>Contatti:</strong> <em>Ancora da inserire</em></p>
    </footer>

</body>
</html>
