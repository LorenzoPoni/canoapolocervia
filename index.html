<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scuola di Canoa Polo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff; 
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #0066cc; 
            color: white;
            padding: 30px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2.5em;
            margin: 0 0 20px 0;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .tab-button {
            background-color: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.6);
            color: white;
            padding: 10px 24px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .tab-button:hover {
            background-color: rgba(255,255,255,0.3);
        }
        .tab-button.active {
            background-color: white;
            color: #0066cc;
            font-weight: bold;
        }
        .content-container {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .page-section {
            display: none;
        }
        .page-section.active {
            display: block;
        }
        .intro {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .image-block {
            display: block;
            margin: 20px auto;
        }
        img {
            border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
            display: inline-block;
        }
        .caption {
            font-size: 0.9em;
            color: #555;
            font-style: italic;
            margin-top: 10px;
        }
        .contact-card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            padding: 30px;
            font-size: 1.2em;
            line-height: 1.8;
        }
        footer {
            background-color: #e0e0e0;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Scuola di Canoa Polo</h1>
        <nav>
            <button class="tab-button active" data-tab="home" onclick="showTab('home')">Home</button>
            <button class="tab-button" data-tab="contatti" onclick="showTab('contatti')">Contatti</button>
        </nav>
    </header>

    <div class="content-container">
        <section id="home" class="page-section active">
            <p class="intro">In questo sito troverai tutte le informazioni per iniziare il tuo percorso nella canoa polo!</p>

            <div class="image-block">
                <img src="CanoaPoloPlayerNew.jpg" alt="Giocatore di canoa polo in azione sull'acqua" width="400" height="200">
                <p class="caption">Canoa Kayak Club Cervia</p>
            </div>
        </section>

        <section id="contatti" class="page-section">
            <div class="contact-card">
                <p><strong>Tel:</strong> +39 123 456 7890</p>
                <p><strong>Email:</strong> napoleone.bonaparte1821@gmail.com</p>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; Scuola di Canoa Polo</p>
    </footer>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.page-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');
            document.querySelector('.tab-button[data-tab="' + tabId + '"]').classList.add('active');
        }
    </script>
</body>
</html>
