<!DOCTYPE html>
<html lang="it">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scuola di Canoa Polo</title>
    <style>
        /* Stili CSS per rendere il sito più bello */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff; /* Un colore azzurro chiaro che richiama l'acqua */
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #0066cc; /* Blu sportivo */
            color: white;
            padding: 30px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2.5em;
            margin: 0;
        }
        main {
            padding: 40px 20px;
        }
        .intro {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .image-container {
            margin-bottom: 20px;
        }
        img {
            border-radius: 12px; /* Angoli arrotondati */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* Leggera ombra */
            max-width: 100%;
            height: auto;
        }
        .caption {
            font-size: 0.9em;
            color: #555;
            font-style: italic;
            margin-top: 10px;
        }
        footer {
            background-color: #e0e0e0;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
 </head>
 <body>

    <header>
        <h1>Scuola di Canoa Polo</h1>
    </header>

    <main>
        <p class="intro">In questo sito troverai tutte le informazioni per iniziare il tuo percorso nella canoa polo!</p>
        
        <div class="image-container">
            <img src="CanoaPoloPlayer.jfif" alt="Giocatore di canoa polo in azione sull'acqua" width="400" height="200">
            <p class="caption">Canoa Kayak Club Cervia</p>
        </div>
    </main>

    <footer>
        <p><strong>Contatti:</strong> <em>Ancora da inserire</em></p>
    </footer>

 </body>
</html>
